# === Famille U — Sparse-structured ===

- prop_metric: U2_monarch_distance.epsilon_monarch_median
  oracle: DV
  prediction: low
  threshold_low: 0.25
  note: "Si DINOv2 est H-matrix, Monarch devrait l'approcher"
