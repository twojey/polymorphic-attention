# Prédictions a priori — Partie 1
#
# Format YAML : liste de dicts évalués par livrables.partie1_predictions_vs_measured.
# Pre-enregistré 2026-05-11 ~11:00 UTC, révisé 2026-05-12.
#
# Format de chaque entrée :
#   prop_metric: "<property_name>.<metric_key>"
#   oracle: "<OR|LL|SC|DV|CL|ES>"
#   prediction: "low" | "medium" | "high" | <numeric value>
#   threshold_low: <float>   # si prediction == "low": observed < threshold_low ⇒ validé
#   threshold_high: <float>  # si prediction == "high": observed > threshold_high ⇒ validé
#   tolerance: 0.10  # si prediction numérique : |obs - pred| / |pred| ≤ tolérance
#   note: "..."

# === Famille A — Spectral ===

- prop_metric: A1_r_eff_theta099.r_eff_median
  oracle: DV
  prediction: low
  threshold_low: 6.0
  note: "DINOv2 attendu le plus low-rank (patches voisins corrélés)"

- prop_metric: A1_r_eff_theta099.r_eff_median
  oracle: SC
  prediction: high
  threshold_high: 12.0
  note: "StarCoder attendu le plus high-rank (logique précise)"

- prop_metric: A1_r_eff_theta099.r_eff_median
  oracle: LL
  prediction: low
  threshold_low: 8.0

- prop_metric: A4_spectral_entropy.spectral_entropy_norm_median
  oracle: DV
  prediction: low
  threshold_low: 0.4
  note: "Concentré spectral attendu"

# === Famille B — Structurel ===

- prop_metric: B1_toeplitz_distance.toeplitz_distance_relative_median
  oracle: OR
  prediction: high
  threshold_high: 0.30
  note: "Pas de Toeplitz pur attendu (data-dépendance)"

- prop_metric: B5_block_diagonal_distance.block_diag_relative_distance_median
  oracle: DV
  prediction: low
  threshold_low: 0.15
  note: "Block-diag fort attendu pour patches"

- prop_metric: B4_sparse_fraction.sparse_fraction_median
  oracle: SC
  prediction: high
  threshold_high: 0.50
  note: "Code = sparse"

- prop_metric: B6_banded_distance.rel_distance_median
  oracle: ES
  prediction: low
  threshold_low: 0.20
  note: "Protéines = interactions locales (banded)"

# === Famille G — Algébrique ===

- prop_metric: G2_symmetry.is_symmetric_fraction
  oracle: OR
  prediction: low
  threshold_low: 0.01
  note: "Stochastique row-wise ⇒ non symétrique"

