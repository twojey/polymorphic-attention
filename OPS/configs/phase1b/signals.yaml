# Configuration des 3 signaux candidats — Phase 1.5 (Identification Gate)
# Spec : DOC/01b §1, §3, §8 (pièges méthodologiques)

defaults:
  - _self_
  - thresholds_phase1b: thresholds_phase1b

domain: smnist
sprint: 1

# --- Banc hybride (DOC/01b §2.1) ---
bench:
  n_examples: 2000
  seed: 100
  seq_len: null   # null = chaque sample garde sa longueur naturelle
  structured_omegas: [2, 4, 6, 8, 10, 12]
  structured_deltas: [64, 256, 1024, 4096]
  structured_entropy_max: 0.2
  noise_entropies: [0.0, 0.25, 0.5, 0.75, 1.0]

# --- S_KL ---
s_kl:
  enabled: true
  baseline:
    n_calibration_examples: 1024     # taille de l'échantillon pour calibrer le baseline
    seed: 200                         # SEED FIXÉ avant le banc (cf. DOC/01b §8 piège 1)
    use_noise_only: true              # baseline = moyenne sur séquences (ω=0, Δ=0, ℋ étalée)

# --- S_Grad ---
s_grad:
  enabled: true
  # S_Grad calculable uniquement à l'entraînement. Si retenu, exigera
  # un proxy distillé analogue à la Distillabilité de S_Spectral.

# --- S_Spectral ---
s_spectral:
  enabled: true
  K: 64                       # FIXÉ avant le banc (DOC/01b §8 piège 2)
  tau: 1.0e-3
  use_randomized: true
  q_oversample: 8

# --- Sous-échantillonnage tokens (DOC/01b §8 piège 3) ---
subsample:
  every_k_tokens: 8           # un token tous les 8 pour l'indépendance Spearman
  seed: 300

# --- Bootstrap pour IC95 (DOC/01b §8 piège 4) ---
bootstrap:
  n_boot: 2000
  alpha: 0.05
