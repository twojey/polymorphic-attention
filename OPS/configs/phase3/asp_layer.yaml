# Phase 3 — ASPLayer. Sprint 2, Structure-MNIST.
# Spec : DOC/03. Pré-enregistré (T.1).
#
# IMPORTANT : `backbone.class_name` est à FIXER après lecture du verdict
# phase 2 (rapport phase2.md, champ "class_dominante"). Par défaut on
# utilise "identity" qui permet un smoke check de l'infrastructure
# Matriochka + Soft-Mask SANS Backbone.

defaults:
  - _self_
  - thresholds_phase3@thresholds_phase3

domain: smnist
sprint: 2
seed: 1000

# --- Modèle (DOIT matcher Oracle pour comparabilité) ---
model:
  d_model: 256
  n_heads: 8
  n_layers: 6
  d_ff: 1024
  max_seq_len: 8192
  dropout: 0.0
  n_classes: 10

# --- SSG (réplique de oracle_smnist.yaml pour cohérence tri-partition) ---
ssg:
  n_ops: 4
  n_noise: 8
  seed_train: 42
  seed_val: 43
  seed_audit_svd: 44
  n_examples_per_regime: 4096
  axes:
    omega:
      sweep: [0, 1, 2, 4, 6, 8]
      reference: 2
    delta:
      sweep: [0, 16, 64, 256, 1024]
      reference: 16
    entropy:
      sweep: [0.0, 0.25, 0.5, 0.75, 1.0]
      reference: 0.0

# --- Tri-partition (DOC/01 §8.6, mêmes seeds que phase 1) ---
dataset_split_smnist:
  train_oracle: 0.70
  audit_svd: 0.20
  init_phase3: 0.10
  seed: 7

# --- Backbone (post-phase-2 obligatoire pour run scientifique sérieux) ---
backbone:
  class_name: identity      # PLACEHOLDER. Override post-phase2 :
                            #   toeplitz | hankel | identity | linear | composite
                            # Ex : backbone.class_name=toeplitz
  params:                   # paramètres spécifiques à la classe
    kernel_len: 256
    state_size: 32
    n_heads: 1

# --- ASPLayer ---
asp_layer:
  d_model: 256              # doit matcher model.d_model
  R_max: 32                 # à raffiner via R_max recommandé phase 2
  soft_mask_beta: 4.0
  layernorm: true
  init_strategy: xavier     # xavier | orthogonal | smart
  smart_init_K_per_layer: 16
  smart_init_k_per_head: 2
  # Mode V2 (2026-05-12) — ΔAttn comme attention low-rank token-token.
  # "linear" (spec V1) = projection U·m·V^T·x indépendante par token (échec phase 3 v1
  # car pas de token-mixing). "attention" (V2) = softmax((x·U·m)(x·V·m)^T)·x.
  delta_attn_mode: attention

# --- Training ---
training:
  batch_size: 32
  lr: 3.0e-4
  weight_decay: 0.0
  max_epochs: 10
  grad_clip: 1.0
  log_interval_steps: 20
  precision: bf16-mixed
  # Cap robustesse : nombre max de batches qu'on tolère de skip dans une
  # epoch (chacun a déjà 1 retry OOM avec empty_cache). Au-delà → raise
  # (probable dataset corrompu ou CUDA persistant cassé).
  max_batch_skips_per_epoch: 5

# --- Losses ---
loss:
  matriochka:
    n_rank_samples: 4
    weight_strategy: uniform
    lambda_weight: 1.0
  consistency:
    weight: 0.1
    n_samples: 4
    delta: 1
  task:
    type: cross_entropy

# --- Sanity checks (DOC/03 §3.7) ---
sanity:
  saturation_tolerance: 0.10
  smoothness_max_jump: 0.5
  rank_grid_steps: 8

# --- Checkpoint / resume (DOC/feedback_script_robustness §2) ---
# Sauvegarde model + optimizer state après chaque epoch dans state_dir.
# Latest + best (val_acc) atomic via rename. Resume au lancement si
# fingerprint compatible (R_max, d_model, n_layers, backbone_class).
checkpoint:
  enabled: true
  # dir : null → OPS/logs/phase3_state/ par défaut
  dir: null
  # mlflow_log : copie best.pt + latest.pt vers MLflow artifacts (gros, opt-in)
  mlflow_log: false
